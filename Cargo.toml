[package]
name = "riftx"
version = "0.1.0"
edition = "2024"

[lib]
name = "riftx"
path = "src/lib.rs"

[[bin]]
name = "riftx"
path = "src/main.rs"

[dependencies]
aes-gcm = "0.10.3"
argon2 = "0.5.3"
clap = { version = "4.6.0", features = ["derive"] }
crossterm = "0.29.0"
liblzma = "0.4.6"
ratatui = "0.30.0"
tar = "0.4.45"
