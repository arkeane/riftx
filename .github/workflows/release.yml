name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - name: x86_64-linux
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: riftx
            asset: riftx-x86_64-linux

          - name: x86_64-windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: riftx.exe
            asset: riftx-x86_64-windows.exe

          - name: aarch64-macos
            os: macos-latest
            target: aarch64-apple-darwin
            artifact: riftx
            asset: riftx-aarch64-macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mv artifacts/riftx-x86_64-linux/riftx         artifacts/riftx-x86_64-linux
          mv artifacts/riftx-x86_64-windows/riftx.exe   artifacts/riftx-x86_64-windows.exe
          mv artifacts/riftx-aarch64-macos/riftx         artifacts/riftx-aarch64-macos
          zip -r artifacts/source.zip . \
            --exclude '.git/*' \
            --exclude 'target/*' \
            --exclude 'artifacts/*'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/riftx-x86_64-linux
            artifacts/riftx-x86_64-windows.exe
            artifacts/riftx-aarch64-macos
            artifacts/source.zip
          generate_release_notes: true
